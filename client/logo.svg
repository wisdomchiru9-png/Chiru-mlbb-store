<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff005f" />
      <stop offset="100%" stop-color="#7a00ff" />
    </linearGradient>
    <radialGradient id="g2" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080f3a" />
      <stop offset="100%" stop-color="#110b36" />
    </linearGradient>
    <filter id="heroGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="boardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="13" flood-color="#000" flood-opacity="0.45" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="80" ry="80" fill="url(#g3)" />
  <g filter="url(#boardShadow)">
    <rect x="28" y="28" width="456" height="456" rx="72" ry="72" fill="none" stroke="url(#g1)" stroke-width="10" opacity="0.65" />
  </g>

  <path d="M140 180 C128 240 140 320 220 350 C300 380 370 330 384 264 C398 198 342 156 278 154 C225 152 180 186 140 180 Z" fill="url(#g1)" opacity="0.75" />
  <path d="M150 200 C168 165 240 150 282 170 C310 185 330 222 322 270 C314 318 280 350 232 354 C178 360 160 275 150 200 Z" fill="#fff" opacity="0.16" />

  <circle cx="256" cy="250" r="98" fill="url(#g1)" opacity="0.95" filter="url(#heroGlow)" />
  <circle cx="256" cy="250" r="78" fill="url(#g2)" />

  <path d="M256 184 L280 268 L256 292 L232 268 Z" fill="#0f172a" />
  <path d="M202 224 L310 224 L286 300 L226 300 Z" fill="#ffffff" opacity="0.08" />

