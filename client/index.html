<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chiru MLBB Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>💎 Chiru MLBB Store</h1>
  <p>Fast & Safe Diamond Top-Up</p>
</header>

<!-- PLAYER INFO -->
<div class="player">
  <h2>Enter Player Details</h2>

  <input id="uid" placeholder="Player ID">
  <input id="server" placeholder="Server ID">
  <br>

  <button onclick="checkPlayer()">Check Player</button>

  <!-- Avatar + Nickname -->
  <img id="avatar" width="60" alt="Player Avatar">
  <p id="nickname"></p>
</div>

<!-- DIAMOND PACKAGES -->
<h2>Choose Diamonds</h2>
<div id="packages"></div>

<!-- PAYMENT BOX -->
<div id="orderBox" class="hidden">
  <h2>Complete Payment</h2>
  <p id="orderInfo"></p>
  <img src="upi-qr.png" width="220" alt="UPI QR">
  <p>Scan this QR with any UPI app</p>
  <button onclick="confirmPayment()">I Have Paid</button>
</div>

<footer>
  <p>Powered by Chiru Store</p>
</footer>

<script src="script.js"></script>
</body>
</html>
